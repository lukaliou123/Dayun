<script type="module">
import * as THREE from 'three';

// ===== SECTION 1: CONSTANTS & CONFIGURATION =====
const SEGMENT_LENGTH = 200;
const ROAD_WIDTH = 2000;
const RUMBLE_LENGTH = 3;
const LANES = 3;
const DRAW_DISTANCE = 200;
const FIELD_OF_VIEW = 100;
const CAMERA_HEIGHT = 1000;

const MAX_SPEED = SEGMENT_LENGTH * 60;
const ACCEL = MAX_SPEED / 5;
const BRAKE_DECEL = -MAX_SPEED;
const NATURAL_DECEL = -MAX_SPEED / 5;
const OFF_ROAD_DECEL = -MAX_SPEED / 2;
const OFF_ROAD_LIMIT = MAX_SPEED / 4;
const CENTRIFUGAL_FORCE = 0.3;

const TRUCK_INITIAL_DISTANCE = 40;
const TRUCK_SPEED_RATIO = 0.9;       // 第一关：比玩家稍慢，靠初始距离近制造压力
const TRUCK_SPEED_RATIO_L2 = 1.15;  // 第二关：比玩家略快，稳定追近不超圈
const TRUCK_SPEED_RATIO_L3 = 1.25;  // 第三关：更快
const TRUCK_CATCHUP_ACCEL = 0.003;
const TRUCK_GAME_OVER_DIST = 3;
const MIRROR_ZOOM_START_DIST = 320;
const MIRROR_ZOOM_END_DIST = 18;

// 3D-specific
const CURVE_TO_ANGLE = 0.006;
const CAM_HEIGHT_3D = 1100;
const CAM_FOLLOW_DIST = 2800;
const CAM_LOOK_AHEAD = 5000;
const CAM_FOV = 72;

const COLORS = {
    SKY: '#72D7EE',
    TREE: '#005108',
    LIGHT: { road: '#6B6B6B', rumble: '#555555', grass: '#10AA10', lane: '#CCCCCC' },
    DARK:  { road: '#696969', rumble: '#BBBBBB', grass: '#009A00', lane: '#696969' },
    FINISH: { road: '#333333', rumble: '#FF0000', grass: '#10AA10', lane: '#FFFFFF' }
};

const CURVE = { NONE: 0, EASY: 2, MEDIUM: 4, HARD: 6, SHARP: 10 };
const STATE = { MENU: 'menu', COUNTDOWN: 'countdown', PLAYING: 'playing', GAMEOVER: 'gameover', WIN: 'win', LEVEL_CLEAR: 'levelclear', LEVEL2_CLEAR: 'level2clear' };
const VIEW = { PLAYER: 'player', MIRROR: 'mirror' };

// ===== SECTION 2: UTILITY FUNCTIONS =====
function clamp(value, min, max) { return Math.max(min, Math.min(value, max)); }
function interpolate(a, b, percent) { return a + (b - a) * percent; }
function percentRemaining(n, total) { return (n % total) / total; }

function overlap(x1, w1, x2, w2) {
    const half1 = w1 / 2, half2 = w2 / 2;
    return !((x1 + half1) < (x2 - half2) || (x1 - half1) > (x2 + half2));
}

// ===== SECTION 3: ROAD/TRACK BUILDER =====
let segments = [];
let trackLength = 0;

function addSegment(curve, elevation) {
    const n = segments.length;
    const isLight = Math.floor(n / RUMBLE_LENGTH) % 2 === 0;
    segments.push({
        index: n,
        curve: curve,
        elevation: elevation || 0,  // Y offset for this segment (Level 3 height)
        color: isLight ? COLORS.LIGHT : COLORS.DARK,
        sprites: [],
        isFinish: false,
        world3d: { x: 0, y: 0, z: 0, angle: 0 }
    });
}

function addStraight(num, elevation) {
    for (let i = 0; i < num; i++) addSegment(CURVE.NONE, elevation || 0);
}

function addStraightSlope(num, elevStart, elevEnd) {
    for (let i = 0; i < num; i++) {
        addSegment(CURVE.NONE, elevStart + (elevEnd - elevStart) * (i / num));
    }
}

function addCurve(num, curve, easeIn, easeOut, elevation) {
    easeIn = easeIn || 0;
    easeOut = easeOut || 0;
    elevation = elevation || 0;
    const mid = num - easeIn - easeOut;
    for (let i = 0; i < easeIn; i++) addSegment(interpolate(0, curve, i / easeIn), elevation);
    for (let i = 0; i < mid; i++) addSegment(curve, elevation);
    for (let i = 0; i < easeOut; i++) addSegment(interpolate(curve, 0, i / easeOut), elevation);
}

function addSharpTurn(dir, elevation) {
    addCurve(40, CURVE.SHARP * dir, 8, 8, elevation || 0);
}

// 180-degree turn: SHARP curve * dir, enough segments to total ~π radians
// Each segment at curve=10 adds 10*0.006=0.06 rad; π/0.06 ≈ 52 segs
function add180Turn(dir, elevation) {
    addCurve(60, CURVE.SHARP * dir, 10, 10, elevation || 0);
}

function buildTrack() {
    segments = [];
    addStraight(50);
    addCurve(80, CURVE.MEDIUM, 15, 15);
    addStraight(60);
    addSharpTurn(-1);

    const obsStart = segments.length;
    addStraight(80);
    const offsets = [
        [15, -0.5, 0.18],[30, 0.35, 0.18],[45, 0.0, 0.18],
        [55, -0.4, 0.15],[55, 0.5, 0.15],[70, 0.2, 0.2]
    ];
    offsets.forEach(([idx, off, w]) => {
        if (segments[obsStart + idx]) {
            segments[obsStart + idx].sprites.push({ source: 'obstacle', offset: off, width: w });
        }
    });

    addSharpTurn(1);

    const narrowStart = segments.length;
    addStraight(40);
    for (let i = narrowStart; i < segments.length; i++) {
        segments[i].sprites.push({ source: 'barrier', offset: -0.75, width: 0.35 });
        segments[i].sprites.push({ source: 'barrier', offset: 0.75, width: 0.35 });
    }

    addCurve(60, -CURVE.EASY, 10, 10);
    addStraight(80);

    for (let i = segments.length - 12; i < segments.length - 2; i++) {
        if (segments[i]) {
            segments[i].color = COLORS.FINISH;
            segments[i].isFinish = true;
        }
    }

    // Trees
    for (let i = 0; i < segments.length; i++) {
        if (i % 10 === 0) segments[i].sprites.push({ source: 'tree', offset: -1.6 });
        if (i % 13 === 0) segments[i].sprites.push({ source: 'tree', offset: 1.8 });
        if (i % 17 === 0) segments[i].sprites.push({ source: 'tree', offset: -2.0 });
        if (i % 21 === 0) segments[i].sprites.push({ source: 'tree', offset: 2.2 });
    }

    trackLength = segments.length * SEGMENT_LENGTH;
}

function buildTrack2() {
    segments = [];
    // 圆形赛道：600段，curve=1.75，绕一整圈（600*1.75*0.006≈6.3≈2π），圆更大
    addCurve(600, 1.75, 30, 30);

    // 障碍物：每18段放一个，偏向路的一侧，保证另一侧有足够通道
    for (let i = 15; i < segments.length - 15; i += 18) {
        const r = Math.random();
        const side = Math.random() < 0.5 ? -1 : 1;
        // offset 固定在 0.35~0.65 之间，偏边不占中心，留出对面通道
        const offset = side * (0.35 + Math.random() * 0.3);
        if (r < 0.55) {
            segments[i].sprites.push({ source: 'obstacle', offset: offset, width: 0.18 });
        } else {
            // 倒树 width 0.22，只挡约半条路，对面可以绕过
            segments[i].sprites.push({ source: 'fallenTree', offset: offset, width: 0.22 });
        }
    }

    // 终点：最后几段标记为FINISH（跑满一圈）
    for (let i = segments.length - 12; i < segments.length - 2; i++) {
        if (segments[i]) {
            segments[i].color = COLORS.FINISH;
            segments[i].isFinish = true;
        }
    }

    trackLength = segments.length * SEGMENT_LENGTH;
}

function buildTrack3() {
    segments = [];
    const HIGH_ELEV = 3200;   // 第一段高台高度（Three.js Y 单位）

    // === 第一段：高台直道（高处出发）===
    addStraight(25, HIGH_ELEV);   // 高台起步直道

    // 第一个180度急弯（高台上）
    add180Turn(1, HIGH_ELEV);

    // 高台后段直道 + 障碍物区
    const obsHighStart = segments.length;
    addStraight(45, HIGH_ELEV);
    // 障碍物：交错摆放，留有通道（左右交替，保证对侧可以绕过）
    for (let i = 5; i < 40; i += 9) {
        const side = (i % 18 < 9) ? -1 : 1;
        const offset = side * (0.32 + Math.random() * 0.2);
        if (Math.random() < 0.5) {
            segments[obsHighStart + i].sprites.push({ source: 'obstacle', offset, width: 0.18 });
        } else {
            segments[obsHighStart + i].sprites.push({ source: 'fallenTree', offset, width: 0.20 });
        }
    }

    // 坡道预警区：提示玩家即将飞跃
    addStraight(6, HIGH_ELEV);

    // === 坡道：从高台飞跃而下 ===
    // 在坡道的前2段放箱子，增加飞跃难度（要绕过障碍再飞出去）
    const rampStart = segments.length;
    // 坡道最开始放两个箱子（一左一右，中间有缝隙可以穿过）
    addStraight(1, HIGH_ELEV);
    if (segments[rampStart]) {
        segments[rampStart].sprites.push({ source: 'obstacle', offset: -0.55, width: 0.18 });
        segments[rampStart].sprites.push({ source: 'obstacle', offset:  0.55, width: 0.18 });
    }

    // 主坡道（急剧下降，触发飞跃）
    const actualRampStart = segments.length;
    addStraightSlope(10, HIGH_ELEV, 0);  // 急速下坡
    // 在坡道上也放横树（阻挡路面，但玩家飞起来后会跳过去）
    for (let i = 2; i < 8; i += 3) {
        if (segments[actualRampStart + i]) {
            const side = i % 6 < 3 ? -0.4 : 0.4;
            segments[actualRampStart + i].sprites.push({ source: 'fallenTree', offset: side, width: 0.20 });
        }
    }
    // 标记坡道段（触发飞跃物理）
    for (let i = rampStart; i < rampStart + 11; i++) {
        if (segments[i]) segments[i].isRamp = true;
    }

    // === 第二段：低处直道（落地区）===
    addStraight(18, 0);   // 落地缓冲（无障碍，让玩家稳定落地）

    // 第二个180度急弯（低处）
    add180Turn(-1, 0);

    // 低处障碍直道（密集障碍，压迫感更强）
    const obsLowStart = segments.length;
    addStraight(55, 0);
    for (let i = 5; i < 50; i += 9) {
        const side = (i % 18 < 9) ? -1 : 1;
        const offset = side * (0.38 + Math.random() * 0.18);
        if (Math.random() < 0.55) {
            segments[obsLowStart + i].sprites.push({ source: 'fallenTree', offset, width: 0.22 });
        } else {
            segments[obsLowStart + i].sprites.push({ source: 'obstacle', offset, width: 0.18 });
        }
    }

    // 冲刺直道（干净，全速冲线）
    addStraight(28, 0);

    // 终点线：最后几段
    for (let i = segments.length - 12; i < segments.length - 2; i++) {
        if (segments[i]) {
            segments[i].color = COLORS.FINISH;
            segments[i].isFinish = true;
        }
    }

    // 路边树木（只在低处段添加，高台感觉更荒凉）
    for (let i = 0; i < segments.length; i++) {
        if ((segments[i].elevation || 0) < HIGH_ELEV * 0.4) {
            if (i % 11 === 0) segments[i].sprites.push({ source: 'tree', offset: -1.65 });
            if (i % 14 === 0) segments[i].sprites.push({ source: 'tree', offset:  1.85 });
        }
    }

    trackLength = segments.length * SEGMENT_LENGTH;
}

function findSegment(z) {
    const idx = Math.floor(z / SEGMENT_LENGTH) % segments.length;
    return segments[idx < 0 ? 0 : idx];
}

// ===== SECTION 3B: TRACK 3D GEOMETRY =====
function buildTrack3DPositions() {
    let wx = 0, wz = 0, angle = 0;
    for (let i = 0; i < segments.length; i++) {
        // Y = elevation stored directly on segment
        const wy = segments[i].elevation || 0;
        segments[i].world3d = { x: wx, y: wy, z: wz, angle: angle };
        wz -= Math.cos(angle) * SEGMENT_LENGTH;
        wx += Math.sin(angle) * SEGMENT_LENGTH;
        angle += segments[i].curve * CURVE_TO_ANGLE;
    }
}

// Convert game logic coords to Three.js world coords
function gameToWorld(pos, lateralX) {
    const segIdx = clamp(Math.floor(pos / SEGMENT_LENGTH), 0, segments.length - 1);
    const seg = segments[segIdx];
    const a = seg.world3d.angle;
    const px = seg.world3d.x + Math.cos(a) * lateralX * ROAD_WIDTH / 2;
    const py = seg.world3d.y || 0;
    const pz = seg.world3d.z + Math.sin(a) * lateralX * ROAD_WIDTH / 2;
    return new THREE.Vector3(px, py, pz);
}

// ===== SECTION 4: THREE.JS SCENE SETUP =====
let renderer, scene, camera;
let roadMeshes = [];
let spriteMeshes = []; // {mesh, segIdx, offset}
let playerCarMesh, truckMesh;

// Shared materials
const matRoadLight   = new THREE.MeshLambertMaterial({ color: 0x6B6B6B });
const matRoadDark    = new THREE.MeshLambertMaterial({ color: 0x696969 });
const matRoadFinish  = new THREE.MeshLambertMaterial({ color: 0x333333 });
const matRumbleLight = new THREE.MeshLambertMaterial({ color: 0x555555 });
const matRumbleDark  = new THREE.MeshLambertMaterial({ color: 0xBBBBBB });
const matRumbleFinish= new THREE.MeshLambertMaterial({ color: 0xFF0000 });
const matGrassLight  = new THREE.MeshLambertMaterial({ color: 0x10AA10 });
const matGrassDark   = new THREE.MeshLambertMaterial({ color: 0x009A00 });
const matLane        = new THREE.MeshLambertMaterial({ color: 0xCCCCCC });

function setupRenderer() {
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x72D7EE);
    document.body.insertBefore(renderer.domElement, document.getElementById('hud'));

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });
}

function setupCamera() {
    camera = new THREE.PerspectiveCamera(
        CAM_FOV,
        window.innerWidth / window.innerHeight,
        10,
        SEGMENT_LENGTH * DRAW_DISTANCE * 2
    );
}

function setupLighting() {
    scene.add(new THREE.AmbientLight(0xFFFFFF, 0.65));

    const sun = new THREE.DirectionalLight(0xFFFBE6, 1.2);
    sun.position.set(5000, 8000, 3000);
    scene.add(sun);

    const hemi = new THREE.HemisphereLight(0x87CEEB, 0x228B22, 0.45);
    scene.add(hemi);
}

function buildRoadMeshes() {
    roadMeshes.forEach(m => scene.remove(m));
    roadMeshes = [];

    const roadW = ROAD_WIDTH;
    const segLen = SEGMENT_LENGTH;
    const rumbleW = roadW * 0.12;
    const grassW  = roadW * 6;

    for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];
        const next = segments[(i + 1) % segments.length];
        const w3 = seg.world3d;
        const n3 = next.world3d;
        const avgAngle = (w3.angle + n3.angle) / 2;
        const cx = (w3.x + n3.x) / 2;
        const cz = (w3.z + n3.z) / 2;

        // Choose materials
        let matRoad, matRumble, matGrass;
        if (seg.isFinish) {
            matRoad = matRoadFinish; matRumble = matRumbleFinish; matGrass = matGrassLight;
        } else if (seg.color === COLORS.DARK) {
            matRoad = matRoadDark; matRumble = matRumbleDark; matGrass = matGrassDark;
        } else {
            matRoad = matRoadLight; matRumble = matRumbleLight; matGrass = matGrassLight;
        }

        const avgY = ((w3.y || 0) + (n3.y || 0)) / 2;
        function makeFlat(w, l, mat, offsetX = 0) {
            const geo = new THREE.PlaneGeometry(w, l);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.rotation.z = -avgAngle;
            const perpX = Math.cos(avgAngle) * offsetX;
            const perpZ = Math.sin(avgAngle) * offsetX;
            mesh.position.set(cx + perpX, avgY, cz + perpZ);
            mesh.receiveShadow = false;
            scene.add(mesh);
            roadMeshes.push(mesh);
            return mesh;
        }

        // Elevated platform supports (Level 3 high sections)
        if (avgY > 500) {
            const pillarMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
            const pillarGeo = new THREE.BoxGeometry(180, avgY, 180);
            [-roadW * 0.55, roadW * 0.55].forEach(pOff => {
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                const ppx = cx + Math.cos(avgAngle) * pOff;
                const ppz = cz + Math.sin(avgAngle) * pOff;
                pillar.position.set(ppx, avgY / 2, ppz);
                scene.add(pillar);
                roadMeshes.push(pillar);
            });
        }

        // Grass (left + right) - only draw at ground level
        if (avgY < 200) {
            makeFlat(grassW, segLen * 1.02, matGrass, -grassW * 0.4);
            makeFlat(grassW, segLen * 1.02, matGrass,  grassW * 0.4);
        }

        // Road surface
        makeFlat(roadW, segLen * 1.02, matRoad);

        // Rumble strips
        makeFlat(rumbleW, segLen * 1.02, matRumble, -(roadW / 2 + rumbleW / 2));
        makeFlat(rumbleW, segLen * 1.02, matRumble,  (roadW / 2 + rumbleW / 2));

        // Lane markings (only light segments to alternate)
        if (seg.color === COLORS.LIGHT && !seg.isFinish) {
            const laneW = roadW / 60;
            for (let lane = 1; lane < LANES; lane++) {
                const laneOffsetX = -roadW / 2 + (roadW / LANES) * lane;
                makeFlat(laneW, segLen * 0.45, matLane, laneOffsetX);
            }
        }
    }
}

// Build all sprite meshes from track data
function buildSpriteMeshes() {
    spriteMeshes.forEach(s => scene.remove(s.mesh));
    spriteMeshes = [];

    for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];
        const w3 = seg.world3d;
        const a = w3.angle;

        seg.sprites.forEach(sprite => {
            let mesh;
            if (sprite.source === 'tree') {
                mesh = createTreeMesh();
            } else if (sprite.source === 'obstacle') {
                mesh = createObstacleMesh();
            } else if (sprite.source === 'barrier') {
                mesh = createBarrierMesh();
            } else if (sprite.source === 'fallenTree') {
                mesh = createFallenTreeMesh();
            } else {
                return;
            }

            // Position: perpendicular offset from road center, at segment elevation
            const lateralX = sprite.offset; // in normalized coords (-1=left edge)
            const wx = w3.x + Math.cos(a) * lateralX * ROAD_WIDTH / 2;
            const wy = w3.y || 0;
            const wz = w3.z + Math.sin(a) * lateralX * ROAD_WIDTH / 2;
            mesh.position.set(wx, wy, wz);
            mesh.rotation.y = -a;
            scene.add(mesh);
            spriteMeshes.push({ mesh, segIdx: i, offset: sprite.offset });
        });
    }
}

function updateCamera() {
    if (gameState !== STATE.PLAYING && gameState !== STATE.COUNTDOWN) return;

    const playerPos3 = gameToWorld(position, playerX);
    const segIdx = clamp(Math.floor(position / SEGMENT_LENGTH), 0, segments.length - 1);
    const seg = segments[segIdx];
    const angle = seg.world3d.angle;
    const segElevY = seg.world3d.y || 0;

    // 相机跟随：Y轴需要反映当前高度+空中高度
    const playerWorldY = segElevY + (playerAirborne ? playerAirY : 0);
    camera.position.x = playerPos3.x - Math.sin(angle) * CAM_FOLLOW_DIST;
    camera.position.y = playerWorldY + CAM_HEIGHT_3D;
    camera.position.z = playerPos3.z + Math.cos(angle) * CAM_FOLLOW_DIST;

    // 看向前方道路
    const aheadIdx = clamp(
        Math.floor((position + CAM_LOOK_AHEAD) / SEGMENT_LENGTH),
        0, segments.length - 1
    );
    const aheadSeg = segments[aheadIdx];
    camera.lookAt(aheadSeg.world3d.x, aheadSeg.world3d.y || 0, aheadSeg.world3d.z);
}

function updateScene3D() {
    // Player car
    const pp = gameToWorld(position, playerX);
    const pSegIdx = clamp(Math.floor(position / SEGMENT_LENGTH), 0, segments.length - 1);
    const pSeg = segments[pSegIdx];
    const baseY = pp.y;  // segment elevation

    if (playerAirborne) {
        // 空中：加上翻转和飞行高度
        playerCarMesh.position.set(pp.x, baseY + playerAirY + 130, pp.z);
        playerCarMesh.rotation.y = -pSeg.world3d.angle + Math.PI;
        playerCarMesh.rotation.x = playerTumbleX;
        playerCarMesh.rotation.z = playerTumbleZ;
    } else {
        playerCarMesh.position.set(pp.x, baseY + 130, pp.z);
        playerCarMesh.rotation.y = -pSeg.world3d.angle + Math.PI;
        // 转向侧倾（只在地面时）
        let tilt = 0;
        if (keys.left && speed > 0) tilt = 0.06;
        if (keys.right && speed > 0) tilt = -0.06;
        playerCarMesh.rotation.z = tilt;
        playerCarMesh.rotation.x = 0;
    }

    // Truck
    if (truckPosition >= 0) {
        const tp = gameToWorld(truckPosition, truckX);
        const tSegIdx = clamp(Math.floor(truckPosition / SEGMENT_LENGTH), 0, segments.length - 1);
        const tSeg = segments[tSegIdx];
        const tBaseY = tp.y;
        truckMesh.visible = true;
        truckMesh.position.set(tp.x, tBaseY + 240, tp.z);
        truckMesh.rotation.y = -tSeg.world3d.angle + Math.PI;
    } else {
        truckMesh.visible = false;
    }
}

// ===== SECTION 5: PLAYER CAR =====
let playerX = 0;
let speed = 0;
let position = 0;
let cameraMode = VIEW.PLAYER;
let currentLevel = 1;

// Jump/tumble physics (Level 3)
let playerAirborne = false;       // 是否在空中
let playerAirY = 0;               // 空中Y位置（相对于地面）
let playerAirVY = 0;              // 垂直速度
let playerTumbleX = 0;            // X轴翻转角度（前翻/后翻）
let playerTumbleZ = 0;            // Z轴翻转角度（侧翻）
let playerTumbleVX = 0;           // X轴翻转速度
let playerTumbleVZ = 0;           // Z轴翻转速度
const GRAVITY = 18000;            // 重力加速度（每秒²）
const JUMP_VELOCITY = 7000;       // 起跳初速度（从坡道飞出时）

const keys = { left: false, right: false, up: false, down: false };

document.addEventListener('keydown', (e) => {
    switch (e.key) {
        case 'ArrowLeft':  case 'a': case 'A': keys.left = true;  e.preventDefault(); break;
        case 'ArrowRight': case 'd': case 'D': keys.right = true; e.preventDefault(); break;
        case 'ArrowUp':    case 'w': case 'W': keys.up = true;    e.preventDefault(); break;
        case 'ArrowDown':  case 's': case 'S': keys.down = true;  e.preventDefault(); break;
        case 'c': case 'C':
            cameraMode = (cameraMode === VIEW.PLAYER) ? VIEW.MIRROR : VIEW.PLAYER;
            e.preventDefault(); break;
    }
});
document.addEventListener('keyup', (e) => {
    switch (e.key) {
        case 'ArrowLeft':  case 'a': case 'A': keys.left = false;  break;
        case 'ArrowRight': case 'd': case 'D': keys.right = false; break;
        case 'ArrowUp':    case 'w': case 'W': keys.up = false;    break;
        case 'ArrowDown':  case 's': case 'S': keys.down = false;  break;
    }
});

function updatePlayer(dt) {
    const playerSeg = findSegment(position);
    const speedPercent = speed / MAX_SPEED;

    if (playerAirborne) {
        // 空中物理：应用重力，无法控制转向加速
        playerAirVY -= GRAVITY * dt;
        playerAirY += playerAirVY * dt;

        // 翻滚角速度持续旋转
        playerTumbleX += playerTumbleVX * dt;
        playerTumbleZ += playerTumbleVZ * dt;
        // 轻微空气阻力减慢翻滚
        playerTumbleVX *= 0.995;
        playerTumbleVZ *= 0.995;

        // 仍可水平移动（但操控变弱）
        const airSteer = 1.2 * dt;
        if (keys.left)  playerX -= airSteer;
        if (keys.right) playerX += airSteer;

        // 落地检测：落到地面高度（当前段的elevation）
        const groundY = playerSeg.elevation || 0;
        if (playerAirY <= 0) {
            // 落地！
            playerAirY = 0;
            playerAirborne = false;
            playerTumbleVX = 0;
            playerTumbleVZ = 0;
            // 落地冲击：根据垂直速度决定减速
            const impactFactor = Math.abs(playerAirVY) / JUMP_VELOCITY;
            speed *= Math.max(0.05, 1.0 - impactFactor * 0.9);
            playerAirVY = 0;
            // 落地震动效果
            crashIntensity = 25;
            crashTimer = 0.5;
        }
        position += speed * 0.6 * dt;  // 空中略微减速前进
    } else {
        // 正常地面驾驶
        if (stuckOnObstacle) {
            speed = 0;
        } else if (keys.up) {
            speed += ACCEL * dt;
        } else if (keys.down) {
            speed += BRAKE_DECEL * dt;
        } else {
            speed += NATURAL_DECEL * dt;
        }

        const steerSpeed = 3.0;
        const steerAmount = stuckOnObstacle ? 1.5 * dt : steerSpeed * dt * Math.max(speedPercent, 0.1);
        if (keys.left)  playerX -= steerAmount;
        if (keys.right) playerX += steerAmount;

        playerX -= (playerSeg.curve * CENTRIFUGAL_FORCE * speedPercent * speedPercent * dt);

        if (playerX < -1 || playerX > 1) {
            if (speed > OFF_ROAD_LIMIT) speed += OFF_ROAD_DECEL * dt;
        }

        speed = clamp(speed, 0, MAX_SPEED);
        position += speed * dt;

        // 检测是否驶上坡道（Level 3飞跃触发）
        if (currentLevel === 3 && playerSeg.isRamp && !playerAirborne) {
            // 飞跃！
            playerAirborne = true;
            playerAirY = 0;
            playerAirVY = JUMP_VELOCITY * (0.7 + speedPercent * 0.3);
            // 随机翻滚方向（前翻、侧翻混合）
            playerTumbleVX = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 3);
            playerTumbleZ = 0;
            playerTumbleVZ = (Math.random() - 0.5) * 2.5;
            playerTumbleX = 0;
        }
    }

    if (position >= trackLength) position = trackLength;
}


// ===== SECTION 6: DAYUN TRUCK AI =====
let truckPosition = 0;
let truckSpeed = 0;
let truckMaxSpeed = MAX_SPEED * TRUCK_SPEED_RATIO; // 初始值，startLevel会覆盖
let truckX = 0;
let gameTime = 0;
let truckDelay = 1.0;

function updateTruck(dt) {
    gameTime += dt;
    const truckDelaySec = currentLevel === 3 ? 10.0 : 3.0;
    if (gameTime < truckDelaySec) return;

    // 固定速度，不加速不减速
    truckSpeed = truckMaxSpeed;
    truckPosition += truckSpeed * dt;
    if (truckPosition > trackLength) truckPosition = trackLength;

    if (truckPosition >= 0) {
        const truckSeg = findSegment(truckPosition);
        truckX = interpolate(truckX, 0, 0.1);
        truckX -= truckSeg.curve * 0.008;
        truckX = clamp(truckX, -0.6, 0.6);
    }

    const dist = position - truckPosition;
    if (dist >= 0 && dist < TRUCK_GAME_OVER_DIST * SEGMENT_LENGTH) {
        gameOverReason = 'caught';
        gameState = STATE.GAMEOVER;
    }
    if (truckPosition > position && position > SEGMENT_LENGTH * 10) {
        gameOverReason = 'caught';
        gameState = STATE.GAMEOVER;
    }
}

// ===== SECTION 7: COLLISION SYSTEM =====
let crashTimer = 0;
let crashIntensity = 0;
let stuckOnObstacle = false;

function checkCollisions() {
    // 空中飞跃时不检测地面障碍碰撞
    if (playerAirborne) return;

    const playerSegIdx = Math.floor(position / SEGMENT_LENGTH);
    const playerW = 0.18;
    let currentlyOverlapping = false;

    for (let i = -1; i <= 2; i++) {
        const checkIdx = playerSegIdx + i;
        if (checkIdx < 0 || checkIdx >= segments.length) continue;
        const seg = segments[checkIdx];
        for (let j = 0; j < seg.sprites.length; j++) {
            const sprite = seg.sprites[j];
            if (sprite.source !== 'obstacle' && sprite.source !== 'barrier' && sprite.source !== 'fallenTree') continue;
            const spriteW = sprite.width || 0.18;
            if (overlap(playerX, playerW, sprite.offset, spriteW)) {
                const segZ = seg.index * SEGMENT_LENGTH;
                if (Math.abs(segZ - position) < SEGMENT_LENGTH * 1.5) {
                    currentlyOverlapping = true;
                    if (!stuckOnObstacle && speed > 0) {
                        speed = 0;
                        stuckOnObstacle = true;
                        crashIntensity = 15;
                        crashTimer = 0.3;
                    }
                }
            }
        }
    }

    if (stuckOnObstacle && !currentlyOverlapping) stuckOnObstacle = false;

    if (Math.abs(playerX) > 1.1) {
        gameOverReason = 'offroad';
        gameState = STATE.GAMEOVER;
    }
}

    elProgBar.style.width = (pct * 100) + '%';
    elProgPl.style.left = (pct * 100) + '%';
    elProgLabel.textContent = currentLevel === 1 ? '第一关 终点' : currentLevel === 2 ? '第二关 终点（一圈）' : '第三关 终点';

    const tPct = clamp(truckPosition / trackLength, 0, 1);
    elProgTr.style.left = (Math.max(0, tPct) * 100) + '%';

    const truckDist = Math.max(0, (position - truckPosition) / SEGMENT_LENGTH);
    elDist.textContent = `大运: ${Math.round(truckDist)}m`;
    elDist.style.color = truckDist > 40 ? '#00FF00' : truckDist > 20 ? '#FFCC00' : '#FF3333';

    if (truckDist <= 20) {
        const warn = document.createElement('div');
        elDist.innerHTML = `大运: ${Math.round(truckDist)}m<br><span style="font-size:11px;color:#FF6666">危险!</span>`;
    }

    const modeText = cameraMode === VIEW.MIRROR ? '后视镜: 开启' : '后视镜: 关闭';
    elCamMode.textContent = `${modeText} (C切换)`;

    elMirror.style.display = cameraMode === VIEW.MIRROR ? 'block' : 'none';

    // Danger flash
    const now = Date.now();
    elDanger.style.display = (truckDist < 12 && Math.floor(now / 250) % 2 === 0) ? 'block' : 'none';

    // Crash shake
    if (crashTimer > 0) {
        camera.position.x += (Math.random() - 0.5) * crashIntensity * 3;
        camera.position.y += (Math.random() - 0.5) * crashIntensity;
        crashIntensity *= 0.9;
    }
}

function drawRearMirror() {
    const mW = 270, mH = 100;
    mCtx.clearRect(0, 0, mW, mH);

    const truckDist = Math.max(0.1, (position - truckPosition) / SEGMENT_LENGTH);
    const zoomT = clamp(
        (MIRROR_ZOOM_START_DIST - truckDist) / (MIRROR_ZOOM_START_DIST - MIRROR_ZOOM_END_DIST),
        0, 1
    );
    const distFactor = Math.pow(zoomT, 0.75);

    // Mirror glass background
    const glassGrad = mCtx.createLinearGradient(0, 0, 0, mH);
    glassGrad.addColorStop(0, '#1c2b3f');
    glassGrad.addColorStop(1, '#0d1420');
    mCtx.fillStyle = glassGrad;
    mCtx.fillRect(0, 0, mW, mH);

    // Road stripe hint
    mCtx.strokeStyle = 'rgba(220,220,220,0.35)';
    mCtx.lineWidth = 2;
    mCtx.setLineDash([6, 6]);
    mCtx.beginPath();
    mCtx.moveTo(mW / 2, mH);
    mCtx.lineTo(mW / 2, 8);
    mCtx.stroke();
    mCtx.setLineDash([]);

    const tx = mW / 2;
    const ty = mH - 8;

    if (truckDist > MIRROR_ZOOM_START_DIST) {
        const farT = clamp((truckDist - MIRROR_ZOOM_START_DIST) / 220, 0, 1);
        const farY = 20 + farT * 16;
        const farGap = 10 + farT * 6;
        const farR = 1.8 + (1 - farT) * 2.2;
        mCtx.fillStyle = 'rgba(255,245,120,0.85)';
        mCtx.beginPath(); mCtx.arc(tx - farGap / 2, farY, farR, 0, Math.PI * 2); mCtx.fill();
        mCtx.beginPath(); mCtx.arc(tx + farGap / 2, farY, farR, 0, Math.PI * 2); mCtx.fill();
        mCtx.fillStyle = 'rgba(255,255,255,0.55)';
        mCtx.font = '10px monospace';
        mCtx.textAlign = 'center';
        mCtx.textBaseline = 'top';
        mCtx.fillText('远处追击中', tx, farY + 7);
        return;
    }

    const tw = 40 + 210 * distFactor;
    const th = 24 + 106 * distFactor;
    const jitter = distFactor > 0.6 ? (Math.random() - 0.5) * 3 : 0;
    const jtx = tx + jitter;

    if (distFactor > 0.2) {
        const glareA = 0.12 + distFactor * 0.28;
        mCtx.fillStyle = `rgba(255,255,90,${glareA})`;
        mCtx.beginPath();
        mCtx.ellipse(jtx - tw * 0.25, ty - th * 0.22, tw * 0.16, th * 0.3, 0, 0, Math.PI * 2);
        mCtx.fill();
        mCtx.beginPath();
        mCtx.ellipse(jtx + tw * 0.05, ty - th * 0.22, tw * 0.16, th * 0.3, 0, 0, Math.PI * 2);
        mCtx.fill();
    }

    mCtx.fillStyle = '#0F4DB8';
    mCtx.fillRect(jtx - tw / 2, ty - th, tw, th);
    mCtx.fillStyle = '#0A397F';
    mCtx.fillRect(jtx - tw / 2, ty - th, tw * 0.34, th * 0.72);
    mCtx.fillStyle = '#0C428F';
    mCtx.fillRect(jtx - tw / 2 + tw * 0.36, ty - th + th * 0.07, tw * 0.61, th * 0.83);

    if (tw > 70) {
        mCtx.fillStyle = '#FFFFFF';
        mCtx.font = `bold ${Math.max(10, Math.floor(th * 0.28))}px sans-serif`;
        mCtx.textAlign = 'center';
        mCtx.textBaseline = 'middle';
        mCtx.fillText('大运', jtx + tw * 0.12, ty - th * 0.45);
    }

    mCtx.fillStyle = '#FFF14D';
    mCtx.fillRect(jtx - tw * 0.45, ty - th * 0.2, tw * 0.1, th * 0.1);
    mCtx.fillRect(jtx - tw * 0.2, ty - th * 0.2, tw * 0.1, th * 0.1);

    if (truckDist < 18) {
        const pulse = 0.1 + 0.15 * (Math.sin(Date.now() / 120) * 0.5 + 0.5);
        mCtx.fillStyle = `rgba(255,0,0,${pulse})`;
        mCtx.fillRect(0, 0, mW, mH);
    }
}

const elLevelSelect = document.getElementById('level-select');

function showOverlay(title, sub, info, prompt, showLevelPicker = false) {
    elOvTitle.textContent = title;
    elOvSub.textContent = sub;
    elOvInfo.textContent = info;
    elOvPrompt.textContent = prompt;
    elOverlay.classList.add('show');
    if (showLevelPicker) {
        elLevelSelect.classList.add('show');
    } else {
        elLevelSelect.classList.remove('show');
    }
}
function hideOverlay() {
    elOverlay.classList.remove('show');
    elLevelSelect.classList.remove('show');
}

// Level select buttons
function jumpToLevel(level) {
    startLevel(level);
    gameState = STATE.COUNTDOWN;
    hideOverlay();
    elCdown.classList.add('show');
}
document.getElementById('btn-lv1').addEventListener('click', () => jumpToLevel(1));
document.getElementById('btn-lv2').addEventListener('click', () => jumpToLevel(2));
document.getElementById('btn-lv3').addEventListener('click', () => jumpToLevel(3));

// ===== SECTION 9: GAME STATE MACHINE =====
let gameState = STATE.MENU;
let countdownTimer = 3.0;
let gameOverReason = '';

function startLevel(level) {
    currentLevel = level;
    position = 0;
    playerX = 0;
    speed = 0;
    truckSpeed = 0;
    truckX = 0;
    gameTime = 0;
    truckDelay = 0;
    crashTimer = 0;
    crashIntensity = 0;
    stuckOnObstacle = false;
    gameOverReason = '';
    countdownTimer = 3.0;
    keys.left = keys.right = keys.up = keys.down = false;
    truckMesh.visible = false;

    // 重置飞跃/翻滚状态
    playerAirborne = false;
    playerAirY = 0;
    playerAirVY = 0;
    playerTumbleX = 0;
    playerTumbleZ = 0;
    playerTumbleVX = 0;
    playerTumbleVZ = 0;

    if (level === 1) {
        buildTrack();
        truckMaxSpeed = MAX_SPEED * TRUCK_SPEED_RATIO;
    } else if (level === 2) {
        buildTrack2();
        truckMaxSpeed = MAX_SPEED * TRUCK_SPEED_RATIO_L2;
    } else {
        buildTrack3();
        truckMaxSpeed = MAX_SPEED * TRUCK_SPEED_RATIO_L3;
    }
    truckPosition = -TRUCK_INITIAL_DISTANCE * SEGMENT_LENGTH;

    buildTrack3DPositions();
    buildRoadMeshes();
    buildSpriteMeshes();
}

function resetGame() {
    startLevel(1);
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
        if (gameState === STATE.MENU) {
            resetGame();
            gameState = STATE.COUNTDOWN;
            hideOverlay();
            elCdown.classList.add('show');
            e.preventDefault();
        } else if (gameState === STATE.LEVEL_CLEAR) {
            startLevel(2);
            gameState = STATE.COUNTDOWN;
            hideOverlay();
            elCdown.classList.add('show');
            e.preventDefault();
        } else if (gameState === STATE.LEVEL2_CLEAR) {
            startLevel(3);
            gameState = STATE.COUNTDOWN;
            hideOverlay();
            elCdown.classList.add('show');
            e.preventDefault();
        } else if (gameState === STATE.GAMEOVER || gameState === STATE.WIN) {
            startLevel(1);
            gameState = STATE.COUNTDOWN;
            hideOverlay();
            elCdown.classList.add('show');
            e.preventDefault();
        }
    }
});

// ===== SECTION 10: 3D GAME LOOP =====
let lastTimestamp = 0;
const FIXED_DT = 1 / 60;
let accumulator = 0;

function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);

    const rawDt = (timestamp - lastTimestamp) / 1000;
    const frameTime = Math.min(rawDt, 0.1);
    lastTimestamp = timestamp;

    switch (gameState) {
        case STATE.MENU:
            // Just render static scene
            updateCamera();
            renderer.render(scene, camera);
            break;

        case STATE.COUNTDOWN:
            accumulator += frameTime;
            while (accumulator >= FIXED_DT) {
                countdownTimer -= FIXED_DT;
                accumulator -= FIXED_DT;
            }
            updateScene3D();
            updateCamera();

            const num = Math.ceil(countdownTimer);
            if (countdownTimer > 0) {
                elCdownNum.textContent = num.toString();
            } else {
                elCdownNum.textContent = 'GO!';
                elCdownNum.style.color = '#00FF00';
            }

            if (countdownTimer <= -0.6) {
                gameState = STATE.PLAYING;
                accumulator = 0;
                elCdown.classList.remove('show');
                elCdownNum.style.color = '#FFF';
            }
            renderer.render(scene, camera);
            break;

        case STATE.PLAYING:
            accumulator += frameTime;
            while (accumulator >= FIXED_DT) {
                updatePlayer(FIXED_DT);
                updateTruck(FIXED_DT);
                checkCollisions();
                if (crashTimer > 0) crashTimer -= FIXED_DT;
                accumulator -= FIXED_DT;
            }

            // Win check
            const finishIdx = segments.findIndex(s => s.isFinish);
            if (finishIdx >= 0 && position >= finishIdx * SEGMENT_LENGTH) {
                const kphAvg = Math.round((trackLength / gameTime) / MAX_SPEED * 280);
                if (currentLevel === 1) {
                    gameState = STATE.LEVEL_CLEAR;
                    showOverlay('第一关通关！', 'STAGE 1 CLEAR',
                        `用时: ${gameTime.toFixed(1)}s  |  平均速度: ~${kphAvg} km/h`,
                        '按 ENTER 进入第二关');
                    elOvTitle.style.color = '#FFCC00';
                } else if (currentLevel === 2) {
                    gameState = STATE.LEVEL2_CLEAR;
                    showOverlay('第二关通关！', 'STAGE 2 CLEAR',
                        `用时: ${gameTime.toFixed(1)}s  |  平均速度: ~${kphAvg} km/h`,
                        '按 ENTER 进入第三关');
                    elOvTitle.style.color = '#FF8800';
                } else {
                    gameState = STATE.WIN;
                    showOverlay('成功逃离！大运没追上你！', 'YOU WIN!  🎉',
                        `全程通关！用时: ${gameTime.toFixed(1)}s  |  平均速度: ~${kphAvg} km/h`,
                        '按 ENTER 再来一次，或选择关卡：', true);
                    elOvTitle.style.color = '#00FF00';
                }
            }

            updateScene3D();
            updateCamera();
            updateHUD();
            if (cameraMode === VIEW.MIRROR) drawRearMirror();
            renderer.render(scene, camera);
            break;

        case STATE.GAMEOVER:
            updateScene3D();
            updateCamera();
            renderer.render(scene, camera);
            break;

        case STATE.WIN:
        case STATE.LEVEL2_CLEAR:
            updateScene3D();
            updateCamera();
            renderer.render(scene, camera);
            break;
    }
}

// ===== SECTION 11: INITIALIZATION =====
function init() {
    setupRenderer();
    setupCamera();
    buildTrack();
    buildTrack3DPositions();
    setupScene();
    buildRoadMeshes();
    buildSpriteMeshes();

    // Show menu
    showOverlay('逃离大运', 'ESCAPE FROM DAYUN', '↑/W 加速  ↓/S 刹车  ←/A →/D 转向  C 切换后视镜', '按 ENTER 开始第一关，或选择关卡：', true);
    elOvTitle.style.color = '#FF3333';

    // Setup gameover handler to show overlay
    const origGameLoop = gameLoop;
    let gameOverShown = false;
    let winShown = false;

    lastTimestamp = performance.now();
    requestAnimationFrame(function loop(ts) {
        requestAnimationFrame(loop);
        const rawDt = (ts - lastTimestamp) / 1000;
        const frameTime = Math.min(rawDt, 0.1);
        lastTimestamp = ts;

        if (gameState === STATE.GAMEOVER && !gameOverShown) {
            gameOverShown = true;
            const dist = Math.round(position / SEGMENT_LENGTH);
            if (gameOverReason === 'offroad') {
                showOverlay('冲出赛道了!', 'GAME OVER',
                    `行驶距离: ${dist}m  |  用时: ${gameTime.toFixed(1)}s`,
                    '按 ENTER 重新开始，或选择关卡：', true);
                elOvTitle.style.color = '#FF6600';
            } else {
                showOverlay('被大运撞了!', 'GAME OVER',
                    `行驶距离: ${dist}m  |  用时: ${gameTime.toFixed(1)}s`,
                    '按 ENTER 重新开始，或选择关卡：', true);
                elOvTitle.style.color = '#FF0000';
            }
        }
        if (gameState !== STATE.GAMEOVER) gameOverShown = false;
        if (gameState !== STATE.WIN && gameState !== STATE.LEVEL_CLEAR) winShown = false;

        switch (gameState) {
            case STATE.MENU:
                updateCamera();
                renderer.render(scene, camera);
                break;

            case STATE.COUNTDOWN:
                accumulator += frameTime;
                while (accumulator >= FIXED_DT) {
                    countdownTimer -= FIXED_DT;
                    accumulator -= FIXED_DT;
                }
                updateScene3D();
                updateCamera();
                const n = Math.ceil(countdownTimer);
                if (countdownTimer > 0) {
                    elCdownNum.textContent = n.toString();
                    elCdownNum.style.color = '#FFFFFF';
                } else {
                    elCdownNum.textContent = 'GO!';
                    elCdownNum.style.color = '#00FF00';
                }
                if (countdownTimer <= -0.6) {
                    gameState = STATE.PLAYING;
                    accumulator = 0;
                    elCdown.classList.remove('show');
                }
                renderer.render(scene, camera);
                break;

            case STATE.PLAYING:
                accumulator += frameTime;
                while (accumulator >= FIXED_DT) {
                    updatePlayer(FIXED_DT);
                    updateTruck(FIXED_DT);
                    checkCollisions();
                    if (crashTimer > 0) crashTimer -= FIXED_DT;
                    accumulator -= FIXED_DT;
                }

                const fi = segments.findIndex(s => s.isFinish);
                if (fi >= 0 && position >= fi * SEGMENT_LENGTH && !winShown) {
                    winShown = true;
                    const kphAvg = Math.round((trackLength / gameTime) / MAX_SPEED * 280);
                    if (currentLevel === 1) {
                        gameState = STATE.LEVEL_CLEAR;
                        showOverlay('第一关通关！', 'STAGE 1 CLEAR',
                            `用时: ${gameTime.toFixed(1)}s  |  平均速度: ~${kphAvg} km/h`,
                            '按 ENTER 进入第二关');
                        elOvTitle.style.color = '#FFCC00';
                    } else if (currentLevel === 2) {
                        gameState = STATE.LEVEL2_CLEAR;
                        showOverlay('第二关通关！', 'STAGE 2 CLEAR',
                            `用时: ${gameTime.toFixed(1)}s  |  平均速度: ~${kphAvg} km/h`,
                            '按 ENTER 进入第三关');
                        elOvTitle.style.color = '#FF8800';
                    } else {
                        gameState = STATE.WIN;
                        showOverlay('成功逃离！大运没追上你！', 'YOU WIN!  🎉',
                            `全程通关！用时: ${gameTime.toFixed(1)}s  |  平均速度: ~${kphAvg} km/h`,
                            '按 ENTER 再来一次');
                        elOvTitle.style.color = '#00FF00';
                    }
                }

                updateScene3D();
                updateCamera();
                updateHUD();
                if (cameraMode === VIEW.MIRROR) drawRearMirror();
                renderer.render(scene, camera);
                break;

            case STATE.GAMEOVER:
            case STATE.WIN:
            case STATE.LEVEL_CLEAR:
            case STATE.LEVEL2_CLEAR:
                updateScene3D();
                updateCamera();
                renderer.render(scene, camera);
                break;
        }
    });
}

window.addEventListener('load', init);
</script>
